<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#08090C"/>
  <!-- Rounded card surface -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#0C0D10"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#C9A961" stroke-width="1.5" opacity="0.25"/>
  <!-- Mid ring (dashed simulation via segments) -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#C9A961" stroke-width="1" stroke-dasharray="14 8" opacity="0.45"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="64" fill="none" stroke="#C9A961" stroke-width="1.5" opacity="0.6"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="96"  x2="256" y2="148" stroke="#C9A961" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="364" x2="256" y2="416" stroke="#C9A961" stroke-width="2" opacity="0.5"/>
  <line x1="96"  y1="256" x2="148" y2="256" stroke="#C9A961" stroke-width="2" opacity="0.5"/>
  <line x1="364" y1="256" x2="416" y2="256" stroke="#C9A961" stroke-width="2" opacity="0.5"/>

  <!-- Core glow dot -->
  <circle cx="256" cy="256" r="18" fill="#C9A961" opacity="0.15"/>
  <circle cx="256" cy="256" r="9"  fill="#C9A961" opacity="0.9"/>
  <circle cx="256" cy="256" r="3.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Monogram -->
  <text
    x="256" y="244"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    fill="#C9A961"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="4"
    opacity="0.0"
  >PD</text>

  <!-- Small label arc (bottom) -->
  <text
    x="256" y="380"
    font-family="Arial, sans-serif"
    font-size="20"
    font-weight="600"
    fill="#C9A961"
    text-anchor="middle"
    opacity="0.4"
    letter-spacing="6"
  >COMMAND</text>
</svg>
